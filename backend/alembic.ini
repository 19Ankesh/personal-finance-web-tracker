[alembic]
# Path to migration scripts
script_location = alembic

# Prepend sys.path with this directory so we can import app modules
prepend_sys_path = .

# Version file separator (os = platform default)
version_path_separator = os

# NOTE: The actual URL is injected in alembic/env.py from the DATABASE_URL
# environment variable. This placeholder is required by Alembic's config parser.
sqlalchemy.url = postgresql://user:password@localhost/finsense

[post_write_hooks]
# No post-write hooks configured

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
